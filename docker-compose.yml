services:
  postgres:
    image: postgres:16-alpine
    container_name: elections-postgres
    restart: always

    environment:
      POSTGRES_DB: elections
      POSTGRES_USER: elections
      POSTGRES_PASSWORD: elections

    ports:
      - "5433:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elections -d elections"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./Team 7
    container_name: elections-backend
    restart: always

    environment:
      ELECTION_FRONTEND_URL: http://localhost:5173
      ELECTION_PRELOAD_IDS: ""
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: 2

    ports:
      - "8002:8002"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8002
    container_name: elections-frontend
    restart: always

    depends_on:
      - backend

    ports:
      - "5173:80"

volumes:
  postgres-data:
